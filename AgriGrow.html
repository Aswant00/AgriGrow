    { icon: 'local_fire_department', label: 'Day Streak',       value: `${streak} days` },
    { icon: 'menu_book',             label: 'Lessons Done',     value: completedLessons.length },
    { icon: 'eco',                   label: 'Practices Logged', value: activityCount },
    { icon: 'military_tech',         label: 'Badges Earned',    value: `${badges.filter(b => b.earned).length}/${badges.length}` },
  ];
  return (
    <div className="page">
      <div className="prof-top">
        <div className="prof-av">{user.name?.[0]?.toUpperCase()}</div>
        <div style={{ flex: 1 }}>
          <div className="prof-name">{user.name}</div>
          <div className="prof-sub"><Icon name="location_on" size={11} /> {user.region || '—'}</div>
          {user.cropType && <div className="prof-sub"><Icon name="grain" size={11} /> {user.cropType}</div>}
          {user.experience && <div className="prof-sub"><Icon name="schedule" size={11} /> {user.experience}</div>}
        </div>
        <button className="btn btn-sm" onClick={onSettings}><Icon name="settings" size={14} />Settings</button>
      </div>
      <div className="sec-title"><Icon name="bar_chart" size={15} color="#2e7d32" />My Stats</div>
      <div className="card">
        {stats.map((r, i) => (
          <div key={i} className="info-row"><span className="lbl"><Icon name={r.icon} size={13} color="#aaa" />{r.label}</span><span className="val">{r.value}</span></div>
        ))}
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 12, color: '#888', marginBottom: 4 }}>Level {level} → {level + 1}: {Math.round(levelPct)}%</div>
          <ProgBar pct={levelPct} />
        </div>
      </div>
      <div className="sec-title"><Icon name="military_tech" size={15} color="#2e7d32" />Badges</div>
      <div className="badge-grid">
        {badges.map(b => {
          const meta = ALL_BADGES_META[b.id] || {};
          return (
            <div key={b.id} className={`bdg ${b.earned ? '' : 'locked'}`}>
              <Icon name={meta.icon || 'star'} size={32} color={b.earned ? '#2e7d32' : '#aaa'} />
              <div className="bdg-name">{meta.name}</div>
              <div className="bdg-desc">{meta.desc}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Settings page ───────────────────────────────────────── */
function SettingsPage({ user, onBack, onSaveProfile, onLogout }) {
  const [sub, setSub] = useState(null);
  const [form, setForm] = useState({ name: user.name, email: user.email, region: user.region || '', farmSize: user.farmSize || '', cropType: user.cropType || '', experience: user.experience || '' });
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  // Change-password state
  const [pwForm, setPwForm]   = useState({ cur: '', nw: '', cfm: '' });
  const [pwErr, setPwErr]     = useState('');
  const [pwSaved, setPwSaved] = useState(false);
  const [pwSaving, setPwSaving] = useState(false);

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = async () => {
    setErr(''); setSaving(true);
    try {
      const data = await apiFetch('/profile', { method: 'PUT', body: form });
      onSaveProfile(data.user);
      setSaved(true);
      setTimeout(() => setSaved(false), 2500);
    } catch (e) {
      setErr(e.message);
    } finally { setSaving(false); }
  };

  const changePassword = async () => {
    setPwErr(''); setPwSaved(false);
    if (!pwForm.cur || !pwForm.nw || !pwForm.cfm) { setPwErr('All fields are required.'); return; }
    if (!Object.values(pwChecks(pwForm.nw)).every(Boolean)) { setPwErr('Password must include uppercase, lowercase, numbers, and symbols.'); return; }
    if (pwForm.nw !== pwForm.cfm) { setPwErr('New passwords do not match.'); return; }
    setPwSaving(true);
    try {
      await apiFetch('/auth/change-password', { method: 'PUT', body: { currentPassword: pwForm.cur, newPassword: pwForm.nw, confirmPassword: pwForm.cfm } });
      setPwSaved(true);
      setPwForm({ cur: '', nw: '', cfm: '' });
      setTimeout(() => setPwSaved(false), 3000);
    } catch (e) {
      setPwErr(e.message);
    } finally { setPwSaving(false); }
  };

  if (sub === 'edit') return (
    <div className="page">
      <button className="back-btn" onClick={() => setSub(null)}><Icon name="arrow_back" size={14} />Settings</button>
      <div className="sec-title"><Icon name="edit" size={15} color="#2e7d32" />Edit Profile</div>
      {saved && <div className="alert alert-success"><Icon name="check_circle" size={14} />Profile saved successfully!</div>}
      {err && <div className="alert alert-error"><Icon name="error" size={14} />{err}</div>}
      <div className="fg"><label>Full Name</label><input value={form.name} onChange={e => setField('name', e.target.value)} /></div>
      <div className="fg"><label>Email</label><input type="email" value={form.email} onChange={e => setField('email', e.target.value)} /></div>
      <div className="fg"><label>State / Region</label><select value={form.region} onChange={e => setField('region', e.target.value)}><option value="">Select...</option>{REGIONS.map(r => <option key={r}>{r}</option>)}</select></div>
      <div className="fg"><label>Main Crop Type</label><select value={form.cropType} onChange={e => setField('cropType', e.target.value)}><option value="">Select...</option>{CROP_TYPES.map(c => <option key={c}>{c}</option>)}</select></div>
      <div className="fg"><label>Farming Experience</label><select value={form.experience} onChange={e => setField('experience', e.target.value)}><option value="">Select...</option>{EXP_OPTS.map(x => <option key={x}>{x}</option>)}</select></div>
      <div className="fg"><label>Farm Size (acres)</label><input type="number" value={form.farmSize} onChange={e => setField('farmSize', e.target.value)} /></div>
      <button className="btn btn-green" onClick={save} disabled={saving}>{saving ? 'Saving...' : <><Icon name="save" size={16} />Save Changes</>}</button>
    </div>
  );

  if (sub === 'privacy') return (
    <div className="page">
      <button className="back-btn" onClick={() => { setSub(null); setPwForm({ cur:'', nw:'', cfm:'' }); setPwErr(''); setPwSaved(false); }}>
        <Icon name="arrow_back" size={14} />Settings
      </button>
      <div className="sec-title"><Icon name="lock" size={15} color="#2e7d32" />Privacy &amp; Security</div>

      {pwSaved && <div className="alert alert-success"><Icon name="check_circle" size={14} />Password updated successfully</div>}
      {pwErr   && <div className="alert alert-error"><Icon name="error"         size={14} />{pwErr}</div>}

      {/* Current Password */}
      <div className="fg">
        <label>Current Password</label>
        <input id="cur-pw" type="password" placeholder="Enter current password"
          value={pwForm.cur} onChange={e => setPwForm(f => ({ ...f, cur: e.target.value }))} />
      </div>

      {/* New Password + strength meter */}
      <div className="fg">
        <label>New Password</label>
        <input id="new-pw" type="password" placeholder="Min 8 characters"
          value={pwForm.nw}
          className={pwForm.nw ? (Object.values(pwChecks(pwForm.nw)).every(Boolean) ? 'input-ok' : 'input-error') : ''}
          onChange={e => setPwForm(f => ({ ...f, nw: e.target.value }))} />
        {pwForm.nw && (() => {
          const chk = pwChecks(pwForm.nw);
          const str = pwStrength(chk);
          return (
            <div className="pw-strength">
              <div className="pw-strength-bar">
                <div className="pw-strength-fill" style={{ width: str.pct + '%', background: str.color }} />
              </div>
              <div className="pw-hints">
                {[['length','8+ chars'],['upper','A–Z'],['lower','a–z'],['number','0–9'],['symbol','!@#…']].map(([k,label]) => (
                  <span key={k} className={`pw-hint ${chk[k] ? 'met' : 'unmet'}`}>{chk[k] ? '✓' : '○'} {label}</span>
                ))}
              </div>
            </div>
          );
        })()}
      </div>

      {/* Confirm New Password */}
      <div className="fg">
        <label>Confirm New Password</label>
        <input id="cfm-pw" type="password" placeholder="Repeat new password"
          value={pwForm.cfm}
          className={pwForm.cfm ? (pwForm.cfm === pwForm.nw ? 'input-ok' : 'input-error') : ''}
          onChange={e => setPwForm(f => ({ ...f, cfm: e.target.value }))} />
        {pwForm.cfm && pwForm.cfm !== pwForm.nw && (
          <div className="field-err"><Icon name="error" size={11} />Passwords do not match</div>
        )}
      </div>

      <button id="change-pw-btn" className="btn btn-green" onClick={changePassword}
        disabled={pwSaving} style={{ opacity: pwSaving ? 0.6 : 1 }}>
        {pwSaving ? 'Updating...' : <><Icon name="lock_reset" size={16} />Update Password</>}
      </button>
    </div>
  );


  if (sub === 'about') return (
    <div className="page">
      <button className="back-btn" onClick={() => setSub(null)}><Icon name="arrow_back" size={14} />Settings</button>
      <div className="sec-title"><Icon name="info" size={15} color="#2e7d32" />About AgriGrow</div>
      <div className="card">
        {[{ l: 'Project', v: 'SIH25075' }, { l: 'App Name', v: 'AgriGrow' }, { l: 'Version', v: '1.0.0' }, { l: 'Purpose', v: 'Sustainable Farming' }, { l: 'Contact', v: 'support@agrigrow.app' }].map((r, i) => (
          <div key={i} className="info-row"><span className="lbl">{r.l}</span><span className="val">{r.v}</span></div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="page">
      <button className="back-btn" onClick={onBack}><Icon name="arrow_back" size={14} />Profile</button>
      <div className="sec-title"><Icon name="settings" size={15} color="#2e7d32" />Settings</div>
      <div style={{ marginBottom: 16 }}>
        <div className="settings-section-title">Account</div>
        {[{ icon: 'edit', label: 'Edit Profile', sp: 'edit', desc: 'Name, crop type, region' }, { icon: 'lock', label: 'Privacy & Security', sp: 'privacy', desc: 'Password and visibility' }].map(item => (
          <div key={item.sp} className="settings-item" onClick={() => setSub(item.sp)}>
            <div className="settings-item-left"><Icon name={item.icon} size={18} color="#2e7d32" /><div><div className="settings-item-label">{item.label}</div><div className="settings-item-sub">{item.desc}</div></div></div>
            <Icon name="chevron_right" size={16} color="#bbb" />
          </div>
        ))}
      </div>
      <div style={{ marginBottom: 16 }}>
        <div className="settings-section-title">Support</div>
        <div className="settings-item" onClick={() => setSub('about')}>
          <div className="settings-item-left">
            <Icon name="info" size={18} color="#2e7d32" />
            <div>
              <div className="settings-item-label">About AgriGrow</div>
              <div className="settings-item-sub">SIH25075 · Version 1.0.0</div>
            </div>
          </div>
          <Icon name="chevron_right" size={16} color="#bbb" />
        </div>
      </div>
      <button className="btn btn-danger" onClick={onLogout}><Icon name="logout" size={16} />Log Out</button>
    </div>
  );
}

/* ── Admin panel ─────────────────────────────────────────── */
function AdminPanel({ adminUser }) {
  const [tab, setTab]           = useState('analytics');
  const [stats, setStats]       = useState(null);
  const [users, setUsers]       = useState([]);
  const [selUser, setSelUser]   = useState(null);
  const [customMods, setCustomMods] = useState([]);
  const [loading, setLoading]   = useState(false);
  const [showAddMod, setShowAddMod] = useState(false);
  const BLANK_FORM = { title: '', category: 'Soil Management', difficulty: 'Beginner', icon: 'eco', iconColor: '#2e7d32', description: '', duration: '30 min', expertVerified: false };
  const [modForm, setModForm]   = useState(BLANK_FORM);
  const [modSaving, setModSaving] = useState(false);
  const [modErr, setModErr]     = useState('');
  const [toast, setToast]       = useState('');
  const [usersLoaded, setUsersLoaded] = useState(false);
  const [modsLoaded, setModsLoaded]   = useState(false);
  const [showEditMod, setShowEditMod]     = useState(false);
  const [editingModId, setEditingModId]   = useState(null);
  const [editModErr, setEditModErr]       = useState('');
  const [editModSaving, setEditModSaving] = useState(false);
  const [managingMod, setManagingMod]     = useState(null);
  const [manageLessons, setManageLessons] = useState([]);
  const [lessonForm, setLessonForm]       = useState({ title: '', subtitle: '', pts: 20, expertVerified: false });
  const [editingLesson, setEditingLesson] = useState(null);
  const [lessonSaving, setLessonSaving]   = useState(false);
  const [lessonErr, setLessonErr]         = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  useEffect(() => {
    apiFetch('/admin/stats').then(d => setStats(d)).catch(() => {});
  }, []);

  useEffect(() => {
    if (tab === 'users' && !usersLoaded) {
      setLoading(true);
      apiFetch('/admin/users').then(d => { setUsers(d.users); setUsersLoaded(true); }).catch(() => {}).finally(() => setLoading(false));
    }
    if (tab === 'content' && !modsLoaded) {
      apiFetch('/admin/modules').then(d => { setCustomMods(d.modules); setModsLoaded(true); }).catch(() => {});
    }
  }, [tab]);

  const openUser = async (userId) => {
    try { const d = await apiFetch(`/admin/users/${userId}`); setSelUser(d); }
    catch (e) { showToast('Failed to load user info'); }
  };

  const submitModule = async () => {
    setModErr('');
    if (!modForm.title.trim() || !modForm.description.trim()) { setModErr('Title and description are required.'); return; }
    setModSaving(true);
    try {
      const d = await apiFetch('/admin/modules', { method: 'POST', body: modForm });
      setCustomMods(m => [d.module, ...m]);
      setShowAddMod(false); setModForm(BLANK_FORM);
      showToast('Module created!');
    } catch (e) { setModErr(e.message); }
    finally { setModSaving(false); }
  };

  const openEditMod = (m) => {
    setModForm({ title: m.title, category: m.category, difficulty: m.difficulty, icon: m.icon || 'eco', iconColor: m.icon_color || '#2e7d32', description: m.description, duration: m.duration, expertVerified: !!m.expert_verified });
    setEditingModId(m.id); setEditModErr(''); setShowEditMod(true);
  };

  const saveEditMod = async () => {
    setEditModErr('');
    if (!modForm.title.trim() || !modForm.description.trim()) { setEditModErr('Title and description are required.'); return; }
    setEditModSaving(true);
    try {
      const d = await apiFetch(`/admin/modules/${editingModId}`, { method: 'PUT', body: modForm });
      setCustomMods(m => m.map(x => x.id === editingModId ? { ...x, ...d.module } : x));
      setShowEditMod(false); showToast('Module updated!');
    } catch (e) { setEditModErr(e.message); }
    finally { setEditModSaving(false); }
  };

  const deleteModule = async (id) => {
    if (!window.confirm('Delete this module?')) return;
    try {
      await apiFetch(`/admin/modules/${id}`, { method: 'DELETE' });
      setCustomMods(m => m.filter(x => x.id !== id));
      showToast('Module deleted.');
    } catch (e) { showToast('Failed to delete.'); }
  };

  const openManageLessons = (m) => {
    setManagingMod(m); setManageLessons(m.lessons || []);
    setLessonForm({ title: '', subtitle: '', pts: 20, expertVerified: false });
    setEditingLesson(null); setLessonErr('');
  };

  const startEditLesson = (l) => {
    setEditingLesson(l);
    setLessonForm({ title: l.title, subtitle: l.subtitle || '', pts: l.pts, expertVerified: !!l.expertVerified });
  };

  const saveLesson = async () => {
    setLessonErr('');
    if (!lessonForm.title.trim()) { setLessonErr('Lesson title is required.'); return; }
    setLessonSaving(true);
    try {
      if (editingLesson) {
        const d = await apiFetch(`/admin/modules/${managingMod.id}/lessons/${editingLesson.id}`, { method: 'PUT', body: lessonForm });
        setManageLessons(ls => ls.map(l => l.id === editingLesson.id ? { ...l, ...d.lesson } : l));
        setEditingLesson(null);
      } else {
        const d = await apiFetch(`/admin/modules/${managingMod.id}/lessons`, { method: 'POST', body: lessonForm });
        setManageLessons(ls => [...ls, d.lesson]);
      }
      setLessonForm({ title: '', subtitle: '', pts: 20, expertVerified: false });
      showToast(editingLesson ? 'Lesson updated!' : 'Lesson added!');
    } catch (e) { setLessonErr(e.message); }
    finally { setLessonSaving(false); }
  };

  const removeLesson = async (lessonId) => {
    if (!window.confirm('Delete this lesson?')) return;
    try {
      await apiFetch(`/admin/modules/${managingMod.id}/lessons/${lessonId}`, { method: 'DELETE' });
      setManageLessons(ls => ls.filter(l => l.id !== lessonId));
      showToast('Lesson deleted.');
    } catch (e) { showToast('Failed to delete lesson.'); }
  };

  const ROLE_COLOR  = { admin: '#7b1fa2', expert: '#1565c0', farmer: '#2e7d32' };
  const ROLE_BG     = { admin: '#f3e5f5', expert: '#e3f2fd', farmer: '#e8f5e9' };
  const adoption = [
    { label: 'No-till farming', pct: 68, color: '#2e7d32' }, { label: 'Drip irrigation', pct: 54, color: '#1565c0' },
    { label: 'Composting', pct: 79, color: '#558b2f' },       { label: 'Bio pest control', pct: 41, color: '#e65100' },
    { label: 'Cover cropping', pct: 33, color: '#6a1b9a' },   { label: 'Agroforestry', pct: 22, color: '#4e342e' },
  ];
  const ICONS = ['eco', 'water_drop', 'bug_report', 'refresh', 'grain', 'park', 'local_florist', 'agriculture', 'science', 'wb_sunny'];
  const ICON_COLORS = ['#2e7d32','#1565c0','#e65100','#558b2f','#6a1b9a','#4e342e','#f57c00','#00838f'];

  return (
    <div className="page">
      {/* User detail modal */}
      {selUser && (
        <div className="modal-overlay" onClick={() => setSelUser(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()} style={{ maxHeight: '90vh' }}>
            <div className="modal-header">
              <div className="modal-title"><Icon name="person" size={20} color="#2e7d32" />{selUser.user.name}</div>
              <button className="modal-close" onClick={() => setSelUser(null)}><Icon name="close" size={16} /></button>
            </div>
            {/* Role badge */}
            <div style={{ marginBottom: 12 }}>
              <span style={{ fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 20, background: ROLE_BG[selUser.user.role] || '#e8f5e9', color: ROLE_COLOR[selUser.user.role] || '#2e7d32' }}>
                {selUser.user.role.toUpperCase()}
              </span>
            </div>
            {/* Info rows */}
            <div className="card" style={{ marginBottom: 12 }}>
              {[
                { l: 'Email',       v: selUser.user.email },
                { l: 'Region',      v: selUser.user.region || '—' },
                { l: 'Crop Type',   v: selUser.user.cropType || '—' },
                { l: 'Farm Size',   v: selUser.user.farmSize ? `${selUser.user.farmSize} acres` : '—' },
                { l: 'Experience',  v: selUser.user.experience || '—' },
                { l: 'Joined',      v: new Date(selUser.user.createdAt).toLocaleDateString() },
              ].map((r, i) => (
                <div key={i} className="info-row"><span className="lbl">{r.l}</span><span className="val">{r.v}</span></div>
              ))}
            </div>
            {/* Stats */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 12 }}>
              {[
                { icon: 'star',          label: 'Points',   val: selUser.user.points },
                { icon: 'menu_book',     label: 'Lessons',  val: selUser.completedLessons.length },
                { icon: 'military_tech', label: 'Badges',   val: `${selUser.badges.filter(b => b.earned).length}/${selUser.badges.length}` },
                { icon: 'assignment',    label: 'Logs',     val: selUser.activityLogs.length },
                { icon: 'forum',         label: 'Posts',    val: selUser.postCount },
                { icon: 'local_fire_department', label: 'Streak', val: `${selUser.user.streak}d` },
              ].map((s, i) => (
                <div key={i} className="stat-box"><div className="sv" style={{ fontSize: 18 }}>{s.val}</div><div className="sl">{s.label}</div></div>
              ))}
            </div>
            {/* Completed lessons */}
            {selUser.completedLessons.length > 0 && (
              <>
                <div style={{ fontSize: 12, fontWeight: 700, color: '#555', marginBottom: 6 }}>Completed Lessons</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 12 }}>
                  {selUser.completedLessons.map(lid => <span key={lid} style={{ fontSize: 11, background: '#e8f5e9', color: '#2e7d32', padding: '2px 8px', borderRadius: 20, fontWeight: 600 }}>{lid}</span>)}
                </div>
              </>
            )}
            {/* Badge status */}
            <div style={{ fontSize: 12, fontWeight: 700, color: '#555', marginBottom: 6 }}>Badges</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 12 }}>
              {selUser.badges.map(b => {
                const meta = { b1:'First Steps', b2:'Water Saver', b3:'On Fire', b4:'500 Club', b5:'Green Farmer', b6:'Community' };
                return <span key={b.id} style={{ fontSize: 11, padding: '2px 8px', borderRadius: 20, fontWeight: 600, background: b.earned ? '#e8f5e9' : '#f5f5f5', color: b.earned ? '#2e7d32' : '#bbb' }}>{b.earned ? '✓' : '○'} {meta[b.id] || b.id}</span>;
              })}
            </div>
            <button className="btn btn-green" onClick={() => setSelUser(null)}>Close</button>
          </div>
        </div>
      )}

      {/* Add Module modal */}
      {showAddMod && (
        <div className="modal-overlay" onClick={() => setShowAddMod(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title"><Icon name="add_circle" size={20} color="#2e7d32" />Add New Module</div>
              <button className="modal-close" onClick={() => setShowAddMod(false)}><Icon name="close" size={16} /></button>
            </div>
            {modErr && <div className="alert alert-error"><Icon name="error" size={14} />{modErr}</div>}
            <div className="fg"><label>Module Title *</label><input placeholder="e.g. Advanced Cover Cropping" value={modForm.title} onChange={e => setModForm(f => ({ ...f, title: e.target.value }))} /></div>
            <div className="fg"><label>Category *</label>
              <select value={modForm.category} onChange={e => setModForm(f => ({ ...f, category: e.target.value }))}>
                {['Soil Management','Water Management','Pest Management','Crop Management','Agroforestry','Other'].map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div className="fg"><label>Difficulty</label>
                <select value={modForm.difficulty} onChange={e => setModForm(f => ({ ...f, difficulty: e.target.value }))}>
                  {['Beginner','Intermediate','Advanced'].map(d => <option key={d}>{d}</option>)}
                </select>
              </div>
              <div className="fg"><label>Duration</label><input placeholder="30 min" value={modForm.duration} onChange={e => setModForm(f => ({ ...f, duration: e.target.value }))} /></div>
            </div>
            <div className="fg"><label>Description *</label><textarea rows={3} placeholder="What will farmers learn in this module?" value={modForm.description} onChange={e => setModForm(f => ({ ...f, description: e.target.value }))} /></div>
            <div className="fg"><label>Icon</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {ICONS.map(ic => <button key={ic} onClick={() => setModForm(f => ({ ...f, icon: ic }))} style={{ width: 36, height: 36, borderRadius: 8, border: `2px solid ${modForm.icon === ic ? '#2e7d32' : '#ddd'}`, background: modForm.icon === ic ? '#e8f5e9' : '#f9f9f9', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={ic} size={18} color={modForm.icon === ic ? '#2e7d32' : '#aaa'} /></button>)}
              </div>
            </div>
            <div className="fg"><label>Icon Colour</label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {ICON_COLORS.map(c => <button key={c} onClick={() => setModForm(f => ({ ...f, iconColor: c }))} style={{ width: 28, height: 28, borderRadius: '50%', border: `3px solid ${modForm.iconColor === c ? '#222' : 'transparent'}`, background: c, cursor: 'pointer' }} />)}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
              <input type="checkbox" id="evCheck" checked={modForm.expertVerified} onChange={e => setModForm(f => ({ ...f, expertVerified: e.target.checked }))} />
              <label htmlFor="evCheck" style={{ fontSize: 13, cursor: 'pointer' }}>Mark as Expert Verified</label>
            </div>
            {/* Preview */}
            <div style={{ background: '#f9f9f9', border: '1px solid #e0e0e0', borderRadius: 10, padding: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#aaa', marginBottom: 8 }}>PREVIEW</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: modForm.iconColor + '22', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name={modForm.icon} size={22} color={modForm.iconColor} />
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{modForm.title || 'Module Title'}</div>
                  <div style={{ fontSize: 11, color: '#888' }}>{modForm.category} · {modForm.difficulty} · {modForm.duration}</div>
                </div>
              </div>
            </div>
            <button className="btn btn-green" onClick={submitModule} disabled={modSaving}>
              {modSaving ? 'Saving...' : <><Icon name="save" size={16} />Create Module</>}
            </button>
          </div>
        </div>
      )}

      <div className="admin-banner"><Icon name="manage_accounts" size={36} color="#fff" /><div><h3 style={{ fontSize: 16, fontWeight: 700 }}>Admin Dashboard</h3><p style={{ fontSize: 12, opacity: .8, marginTop: 3 }}>Platform monitoring and management</p></div></div>

      <div className="inner-tabs">
        <button className={`inner-tab ${tab === 'analytics' ? 'active' : ''}`} onClick={() => setTab('analytics')}><Icon name="bar_chart" size={14} />Analytics</button>
        <button className={`inner-tab ${tab === 'users' ? 'active' : ''}`} onClick={() => setTab('users')}><Icon name="group" size={14} />Users</button>
        <button className={`inner-tab ${tab === 'content' ? 'active' : ''}`} onClick={() => setTab('content')}><Icon name="description" size={14} />Content</button>
      </div>

      {/* ── Analytics tab ── */}
      {tab === 'analytics' && (<>
        <div className="analytics-grid">
          {[
            { icon: 'group',         label: 'Registered Users',  val: stats ? stats.users : '…'    },
            { icon: 'menu_book',     label: 'Lessons Completed', val: stats ? stats.lessons : '…'  },
            { icon: 'trending_up',   label: 'Practices Logged',  val: stats ? stats.practices : '…'},
            { icon: 'military_tech', label: 'Badges Awarded',    val: stats ? stats.badges : '…'   },
          ].map((a, i) => (
            <div key={i} className="analytics-box">
              <div className="analytics-val">{a.val}</div>
              <div className="analytics-lbl"><Icon name={a.icon} size={11} /> {a.label}</div>
            </div>
          ))}
        </div>
        <div className="sec-title"><Icon name="trending_up" size={15} color="#2e7d32" />Practice Adoption Rates</div>
        <div className="card">{adoption.map((a, i) => (
          <div key={i} style={{ marginBottom: i < adoption.length - 1 ? 12 : 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 4 }}>
              <span style={{ color: '#555', fontWeight: 600 }}>{a.label}</span>
              <span style={{ color: a.color, fontWeight: 700 }}>{a.pct}%</span>
            </div>
            <div className="prog-wrap"><div className="prog-fill" style={{ width: `${a.pct}%`, background: a.color }} /></div>
          </div>
        ))}</div>
      </>)}

      {/* ── Users tab ── */}
      {tab === 'users' && (<>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div className="sec-title" style={{ margin: 0 }}><Icon name="group" size={15} color="#2e7d32" />All Users ({users.length})</div>
        </div>
        {loading ? <Loading /> : users.map(u => (
          <div key={u.id} className="settings-item" onClick={() => openUser(u.id)} style={{ cursor: 'pointer' }}>
            <div className="settings-item-left">
              <div style={{ width: 38, height: 38, borderRadius: '50%', background: ROLE_BG[u.role] || '#e8f5e9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 15, color: ROLE_COLOR[u.role] || '#2e7d32', flexShrink: 0 }}>
                {u.name[0].toUpperCase()}
              </div>
              <div>
                <div className="settings-item-label">{u.name}</div>
                <div className="settings-item-sub">{u.email} · {u.region || 'No region'}</div>
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
              <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 20, background: ROLE_BG[u.role] || '#e8f5e9', color: ROLE_COLOR[u.role] || '#2e7d32' }}>
                {u.role.toUpperCase()}
              </span>
              <span style={{ fontSize: 11, color: '#888' }}><Icon name="star" size={10} color="#f57c00" /> {u.points} pts</span>
            </div>
          </div>
        ))}
      </>)}

      {/* ── Content tab ── */}
      {tab === 'content' && (<>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div className="sec-title" style={{ margin: 0 }}><Icon name="description" size={15} color="#2e7d32" />Modules</div>
          <button className="btn btn-solid" style={{ padding: '7px 12px', fontSize: 12 }} onClick={() => setShowAddMod(true)}>
            <Icon name="add" size={14} />Add Module
          </button>
        </div>
        {/* Built-in modules */}
        <div style={{ fontSize: 11, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>Built-in Modules</div>
        {MODULES.map(m => (
          <div key={m.id} className="settings-item">
            <div className="settings-item-left">
              <div style={{ width: 34, height: 34, borderRadius: 8, background: m.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name={m.icon} size={16} color={m.iconColor} />
              </div>
              <div>
                <div className="settings-item-label">{m.title}</div>
                <div className="settings-item-sub">{m.lessons.length} lessons · {m.difficulty}</div>
              </div>
            </div>
            <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 20, background: '#e8f5e9', color: '#2e7d32' }}>Built-in</span>
          </div>
        ))}
        {/* Custom modules added by admin */}
        {customMods.length > 0 && <>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#aaa', textTransform: 'uppercase', letterSpacing: 1, margin: '14px 0 6px' }}>Custom Modules ({customMods.length})</div>
          {customMods.map(m => (
            <div key={m.id} className="settings-item">
              <div className="settings-item-left">
                <div style={{ width: 34, height: 34, borderRadius: 8, background: (m.icon_color || '#2e7d32') + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name={m.icon || 'eco'} size={16} color={m.icon_color || '#2e7d32'} />
                </div>
                <div>
                  <div className="settings-item-label">{m.title}</div>
                  <div className="settings-item-sub">{m.category} · {m.difficulty} · {m.duration}</div>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 4 }}>
                <button className="btn btn-outline" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => openManageLessons(m)}><Icon name="list" size={13} />Lessons</button>
                <button className="btn btn-outline" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => openEditMod(m)}><Icon name="edit" size={13} />Edit</button>
                <button className="fp-action" style={{ color: '#e53935' }} onClick={() => deleteModule(m.id)}><Icon name="delete" size={15} /></button>
              </div>
            </div>
          ))}
        </>}
      </>)}

      {/* Edit Module Modal */}
      {showEditMod && (
        <div className="modal-overlay" onClick={() => setShowEditMod(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title"><Icon name="edit" size={20} color="#1565c0" />Edit Module</div>
              <button className="modal-close" onClick={() => setShowEditMod(false)}><Icon name="close" size={16} /></button>
            </div>
            {editModErr && <div className="alert alert-error"><Icon name="error" size={14} />{editModErr}</div>}
            <div className="fg"><label>Module Title *</label><input value={modForm.title} onChange={e => setModForm(f => ({ ...f, title: e.target.value }))} /></div>
            <div className="fg"><label>Category *</label>
              <select value={modForm.category} onChange={e => setModForm(f => ({ ...f, category: e.target.value }))}>
                {['Soil Management','Water Management','Pest Management','Crop Management','Agroforestry','Other'].map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div className="fg"><label>Difficulty</label>
                <select value={modForm.difficulty} onChange={e => setModForm(f => ({ ...f, difficulty: e.target.value }))}>
                  {['Beginner','Intermediate','Advanced'].map(d => <option key={d}>{d}</option>)}
                </select>
              </div>
              <div className="fg"><label>Duration</label><input placeholder="30 min" value={modForm.duration} onChange={e => setModForm(f => ({ ...f, duration: e.target.value }))} /></div>
            </div>
            <div className="fg"><label>Description *</label><textarea rows={3} value={modForm.description} onChange={e => setModForm(f => ({ ...f, description: e.target.value }))} /></div>
            <div className="fg"><label>Icon</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {['eco','water_drop','bug_report','refresh','grain','park','local_florist','agriculture','science','wb_sunny'].map(ic => <button key={ic} onClick={() => setModForm(f => ({ ...f, icon: ic }))} style={{ width: 36, height: 36, borderRadius: 8, border: `2px solid ${modForm.icon===ic?'#1565c0':'#ddd'}`, background: modForm.icon===ic?'#e3f2fd':'#f9f9f9', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name={ic} size={18} color={modForm.icon===ic?'#1565c0':'#aaa'} /></button>)}
              </div>
            </div>
            <div className="fg"><label>Icon Colour</label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {['#2e7d32','#1565c0','#e65100','#558b2f','#6a1b9a','#4e342e','#f57c00','#00838f'].map(c => <button key={c} onClick={() => setModForm(f => ({ ...f, iconColor: c }))} style={{ width:28, height:28, borderRadius:'50%', border:`3px solid ${modForm.iconColor===c?'#222':'transparent'}`, background:c, cursor:'pointer' }} />)}
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14 }}>
              <input type="checkbox" id="evEditCheck" checked={modForm.expertVerified} onChange={e => setModForm(f => ({ ...f, expertVerified: e.target.checked }))} />
              <label htmlFor="evEditCheck" style={{ fontSize:13, cursor:'pointer' }}>Mark as Expert Verified</label>
            </div>
            <button className="btn btn-green" onClick={saveEditMod} disabled={editModSaving}>
              {editModSaving ? 'Saving...' : <><Icon name="save" size={16} />Save Changes</>}
            </button>
          </div>
        </div>
      )}

      {/* Manage Lessons Panel */}
      {managingMod && (
        <div className="modal-overlay" onClick={() => setManagingMod(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()} style={{ maxHeight: '92vh' }}>
            <div className="modal-header">
              <div className="modal-title"><Icon name="list" size={20} color="#1565c0" />Lessons — {managingMod.title}</div>
              <button className="modal-close" onClick={() => setManagingMod(null)}><Icon name="close" size={16} /></button>
            </div>
            {manageLessons.length === 0
              ? <p style={{ fontSize:13, color:'#888', textAlign:'center', padding:'12px 0' }}>No lessons yet.</p>
              : manageLessons.map((l, i) => (
                <div key={l.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 0', borderBottom:'1px solid #eee' }}>
                  <div style={{ width:28, height:28, borderRadius:7, background:'#e3f2fd', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:12, color:'#1565c0', flexShrink:0 }}>{i+1}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600 }}>{l.title}</div>
                    <div style={{ fontSize:11, color:'#888' }}>{l.subtitle||'—'} · {l.pts} pts {l.expertVerified?'· ✓':''}</div>
                  </div>
                  <button className="btn btn-outline" style={{ padding:'4px 8px', fontSize:11 }} onClick={() => startEditLesson(l)}><Icon name="edit" size={13} /></button>
                  <button className="fp-action" style={{ color:'#e53935' }} onClick={() => removeLesson(l.id)}><Icon name="delete" size={14} /></button>
                </div>
              ))
            }
            <div style={{ marginTop:14, background:'#f9f9f9', border:'1px solid #e0e0e0', borderRadius:10, padding:12 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#555', marginBottom:10 }}>{editingLesson ? 'Edit Lesson' : 'Add New Lesson'}</div>
              {lessonErr && <div className="alert alert-error" style={{ marginBottom:8 }}><Icon name="error" size={13} />{lessonErr}</div>}
              <div className="fg"><label>Lesson Title *</label><input placeholder="e.g. Understanding Soil Biology" value={lessonForm.title} onChange={e => setLessonForm(f => ({ ...f, title: e.target.value }))} /></div>
              <div className="fg"><label>Subtitle / Summary</label><input placeholder="Short description" value={lessonForm.subtitle} onChange={e => setLessonForm(f => ({ ...f, subtitle: e.target.value }))} /></div>
              <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:10 }}>
                <div className="fg" style={{ flex:1, marginBottom:0 }}><label>Points</label><input type="number" min={5} max={200} value={lessonForm.pts} onChange={e => setLessonForm(f => ({ ...f, pts: parseInt(e.target.value)||20 }))} /></div>
                <div style={{ display:'flex', alignItems:'center', gap:6, paddingTop:18 }}>
                  <input type="checkbox" id="lvCheck" checked={lessonForm.expertVerified} onChange={e => setLessonForm(f => ({ ...f, expertVerified: e.target.checked }))} />
                  <label htmlFor="lvCheck" style={{ fontSize:12 }}>Expert Verified</label>
                </div>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn btn-green" style={{ flex:1 }} onClick={saveLesson} disabled={lessonSaving}>
                  {lessonSaving ? 'Saving...' : <><Icon name="save" size={15} />{editingLesson ? 'Update Lesson' : 'Add Lesson'}</>}
                </button>
                {editingLesson && <button className="btn btn-outline" onClick={() => { setEditingLesson(null); setLessonForm({ title:'', subtitle:'', pts:20, expertVerified:false }); }}>Cancel</button>}
              </div>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast"><Icon name="check_circle" size={15} />{toast}</div>}
    </div>
  );
}

/* ── Root App ────────────────────────────────────────────── */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');
  const [appState, setAppState] = useState({ points: 0, streak: 3, completedLessons: [], todayTasks: [], badges: [] });
  const [activityCount, setActivityCount] = useState(0);
  const [openMod, setOpenMod] = useState(null);
  const [openLesson, setOpenLesson] = useState(null);
  const [toastMsg, setToastMsg] = useState('');
  const [notifs, setNotifs] = useState([
    { id: 'n1', icon: 'menu_book', text: 'New module available: Agroforestry Basics!', time: '2 hours ago', read: false },
    { id: 'n2', icon: 'local_fire_department', text: "You're on a 3-day streak! Keep it up!", time: '5 hours ago', read: false },
    { id: 'n3', icon: 'assignment', text: 'Daily tasks are ready! Complete them all for up to 100 points.', time: 'Yesterday', read: true },
  ]);
  const [showNotifs, setShowNotifs] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [initialLoading, setInitialLoading] = useState(false);

  // On mount — check if token exists and load profile
  useEffect(() => {
    const token = localStorage.getItem('agrigrow_token');
    if (token) {
      setInitialLoading(true);
      apiFetch('/profile').then(data => {
        setUser(data.user);
        setAppState({ points: data.user.points, streak: data.user.streak, completedLessons: data.completedLessons, todayTasks: data.todayTasks, badges: data.badges });
        setActivityCount(data.activityCount);
      }).catch(() => {
        localStorage.removeItem('agrigrow_token');
      }).finally(() => setInitialLoading(false));
    }
  }, []);

  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };
  const navigate = (id) => { setPage(id); setOpenMod(null); setOpenLesson(null); setShowNotifs(false); };
  const unreadCount = notifs.filter(n => !n.read).length;

  const handleLogin = (userData) => {
    setUser(userData);
    // Load full profile state
    apiFetch('/profile').then(data => {
      setAppState({ points: data.user.points, streak: data.user.streak, completedLessons: data.completedLessons, todayTasks: data.todayTasks, badges: data.badges });
      setActivityCount(data.activityCount);
    }).catch(() => {});
  };

  const handleLogout = () => {
    localStorage.removeItem('agrigrow_token');
    setUser(null);
    setPage('home');
    setOpenMod(null);
    setOpenLesson(null);
    setShowSettings(false);
  };

  const handleToggleTask = async (taskId) => {
    try {
      const data = await apiFetch('/progress/task', { method: 'POST', body: { taskId } });
      setAppState(s => ({ ...s, points: data.points, todayTasks: s.todayTasks.map(t => t.id === taskId ? { ...t, done: data.done } : t) }));
    } catch (e) { showToast('Failed to update task'); }
  };

  const handleCompleteLesson = async (lessonId, pts) => {
    try {
      const data = await apiFetch('/progress/lesson', { method: 'POST', body: { lessonId, pts } });
      if (!data.alreadyDone) {
        setAppState(s => ({ ...s, points: data.points, completedLessons: [...s.completedLessons, lessonId], badges: data.badges }));
        showToast(`Lesson complete! +${pts} pts`);
      }
    } catch (e) { showToast('Failed to save progress'); }
  };

  const handleLogPractice = (data) => {
    setAppState(s => ({ ...s, points: data.points, badges: data.badges }));
    setActivityCount(c => c + 1);
  };

  const handleCommunityPost = (data) => {
    setAppState(s => ({ ...s, points: data.points, badges: data.badges }));
  };

  const handleSaveProfile = (updatedUser) => {
    setUser(updatedUser);
    showToast('Profile updated!');
  };

  if (initialLoading) return <div className="app"><Loading /></div>;
  if (!user) return <div className="app"><AuthPage onLogin={handleLogin} /></div>;

  if (user.role === 'admin') return (
    <div className="app">
      <div className="top-bar">
        <h2><Icon name="eco" size={18} />AgriGrow Admin</h2>
        <div className="top-bar-right"><button className="btn btn-sm" onClick={handleLogout}><Icon name="logout" size={14} />Logout</button></div>
      </div>
      <AdminPanel />
    </div>
  );

  if (showSettings) return (
    <div className="app">
      <div className="top-bar">
        <h2><Icon name="eco" size={18} />Settings</h2>
        <div className="top-bar-right"><button className="btn btn-sm" onClick={() => setShowSettings(false)}><Icon name="arrow_back" size={14} />Back</button></div>
      </div>
      <SettingsPage user={user} onBack={() => setShowSettings(false)} onSaveProfile={handleSaveProfile} onLogout={handleLogout} />
    </div>
  );

  const getTitle = () => {
    if (openLesson) return openLesson.lesson.title;
    if (openMod) return openMod.title;
    return { home: 'Dashboard', modules: 'Modules', tracker: 'Tracker', community: 'Community', profile: 'Profile' }[page];
  };

  const renderContent = () => {
    if (openLesson) return <LessonView key={openLesson.lesson.id} lesson={openLesson.lesson} mod={openLesson.mod} appState={appState} onCompleteLesson={handleCompleteLesson} onBack={() => setOpenLesson(null)} onNext={l => setOpenLesson({ lesson: l, mod: openLesson.mod })} />;
    if (openMod) return <ModuleDetail mod={openMod} appState={appState} onLesson={(l, m) => setOpenLesson({ lesson: l, mod: m })} onBack={() => setOpenMod(null)} />;
    switch (page) {
      case 'home':      return <Dashboard user={user} appState={appState} onToggleTask={handleToggleTask} />;
      case 'modules':   return <ModulesPage appState={appState} onOpen={m => { setOpenMod(m); setOpenLesson(null); }} />;
      case 'tracker':   return <TrackerPage appState={appState} onLogPractice={handleLogPractice} toast={showToast} />;
      case 'community': return <CommunityPage user={user} appState={appState} onCommunityPost={handleCommunityPost} toast={showToast} />;
      case 'profile':   return <ProfilePage user={user} appState={appState} activityCount={activityCount} onSettings={() => setShowSettings(true)} />;
      default:          return null;
    }
  };

  return (
    <div className="app">
      <div className="top-bar">
        <h2><Icon name="eco" size={18} />{getTitle()}</h2>
        <div className="top-bar-right">
          {page === 'home' && !openMod && !openLesson && (
            <button className="btn-icon" onClick={() => { setShowNotifs(v => !v); setNotifs(ns => ns.map(n => ({ ...n, read: true }))); }}>
              <Icon name="notifications" size={18} />
              {unreadCount > 0 && <span style={{ position: 'absolute', top: -2, right: -2, background: '#f44336', color: '#fff', fontSize: 9, fontWeight: 700, width: 16, height: 16, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1.5px solid #2e7d32' }}>{unreadCount}</span>}
            </button>
          )}
          <button className="btn btn-sm" onClick={handleLogout}><Icon name="logout" size={14} />Logout</button>
        </div>
      </div>

      {showNotifs && (
        <div className="notif-panel">
          <div className="notif-header">
            <span style={{ fontSize: 14, fontWeight: 700 }}><Icon name="notifications" size={15} /> Notifications</span>
            <button style={{ fontSize: 12, color: '#2e7d32', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600 }} onClick={() => { setNotifs([]); setShowNotifs(false); }}>Clear all</button>
          </div>
          {notifs.length === 0
            ? <div style={{ padding: 24, textAlign: 'center', fontSize: 13, color: '#aaa' }}>No notifications</div>
            : notifs.map(n => (
              <div key={n.id} className={`notif-item ${n.read ? '' : 'unread'}`}>
                <Icon name={n.icon} size={18} color="#2e7d32" />
                <div><div className="notif-text">{n.text}</div><div className="notif-time">{n.time}</div></div>
              </div>
            ))
          }
        </div>
      )}

      <div onClick={() => showNotifs && setShowNotifs(false)}>{renderContent()}</div>

      <div className="bottom-nav">
        {NAV.map(n => (
          <button key={n.id} className={`bn-item ${page === n.id && !openMod && !openLesson ? 'active' : ''}`} onClick={() => navigate(n.id)}>
            <Icon name={n.icon} size={22} />{n.label}
          </button>
        ))}
      </div>

      {toastMsg && <div className="toast"><Icon name="check_circle" size={15} />{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
