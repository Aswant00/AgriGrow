<!DOCTYPE html>
<html lang="en">
ser<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriGrow – Sustainable Farming</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; }

    /* ── Top bar ── */
    .top-bar { background: #2e7d32; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .top-bar h2 { font-size: 17px; display: flex; align-items: center; gap: 6px; }
    .top-bar-right { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 16px; }
    .btn-green  { background: #2e7d32; color: #fff; width: 100%; padding: 13px; font-size: 15px; }
    .btn-green:hover { background: #1b5e20; }
    .btn-green:disabled { background: #aaa; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #2e7d32; border: 1px solid #2e7d32; }
    .btn-solid   { background: #2e7d32; color: #fff; }
    .btn-danger  { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; width: 100%; padding: 12px; }
    .btn-sm { padding: 6px 12px; font-size: 13px; background: rgba(255,255,255,.2); color: #fff; border-radius: 20px; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .btn-icon { background: rgba(255,255,255,.15); border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; position: relative; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; color: #555; font-weight: 600; margin-bottom: 14px; }

    /* ── Page ── */
    .page { padding: 16px; padding-bottom: 80px; }
    .sec-title { font-size: 14px; font-weight: 700; color: #333; margin: 16px 0 10px; display: flex; align-items: center; gap: 6px; }

    /* ── Loading ── */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: #888; font-size: 13px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #2e7d32; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth ── */
    .auth-wrap { padding: 32px 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    .auth-logo  { text-align: center; margin-bottom: 28px; }
    .auth-logo-icon { background: #e8f5e9; width: 72px; height: 72px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .auth-logo h1 { font-size: 26px; font-weight: 700; color: #2e7d32; }
    .auth-logo p  { font-size: 13px; color: #888; margin-top: 4px; }
    .tab-row  { display: flex; border: 1px solid #2e7d32; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
    .tab-btn  { flex: 1; padding: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; background: #fff; color: #2e7d32; }
    .tab-btn.active { background: #2e7d32; color: #fff; }
    .hint { font-size: 12px; color: #888; text-align: center; margin-top: 12px; }

    /* ── Forms ── */
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    .fg input, .fg select, .fg textarea { width: 100%; padding: 11px 13px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; background: #fff; font-family: inherit; }
    .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: #2e7d32; }
    .fg input.input-error { border-color: #e53935 !important; background: #fff8f8; }
    .fg input.input-ok    { border-color: #43a047 !important; }
    .fg textarea { resize: vertical; }
    .field-err { font-size: 11px; color: #c62828; margin-top: 4px; display: flex; align-items: center; gap: 4px; }

    /* ── Password strength meter ── */
    .pw-strength { margin-top: 6px; }
    .pw-strength-bar { height: 4px; border-radius: 4px; background: #e0e0e0; margin-bottom: 4px; }
    .pw-strength-fill { height: 100%; border-radius: 4px; transition: width .3s, background .3s; }
    .pw-hints { display: flex; flex-wrap: wrap; gap: 4px; }
    .pw-hint { font-size: 10px; padding: 2px 7px; border-radius: 20px; display: flex; align-items: center; gap: 3px; }
    .pw-hint.met  { background: #e8f5e9; color: #2e7d32; }
    .pw-hint.unmet{ background: #f5f5f5; color: #aaa; }

    /* ── Alerts ── */
    .alert { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .alert-error   { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }
    .alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }

    /* ── Progress bar ── */
    .prog-wrap { background: #e0e0e0; border-radius: 100px; height: 6px; }
    .prog-fill { height: 100%; border-radius: 100px; background: #2e7d32; transition: width .3s; }

    /* ── Badges ── */
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .badge-easy   { background: #e8f5e9; color: #2e7d32; }
    .badge-medium { background: #fff8e1; color: #f57c00; }
    .badge-hard   { background: #fce4ec; color: #c62828; }
    .badge-expert { background: #e3f2fd; color: #1565c0; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; display: inline-flex; align-items: center; gap: 3px; }

    /* ── Cards ── */
    .card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-bottom: 12px; }

    /* ── Info rows ── */
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: #888; display: flex; align-items: center; gap: 6px; }
    .info-row .val { font-weight: 600; }

    /* ── Welcome / stats ── */
    .welcome-card { background: linear-gradient(135deg, #2e7d32, #43a047); color: #fff; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    .welcome-card .greet { font-size: 13px; opacity: .8; margin-bottom: 4px; }
    .welcome-card h2 { font-size: 20px; font-weight: 700; }
    .welcome-card .loc { font-size: 12px; opacity: .7; margin-top: 4px; }
    .streak-row { display: flex; gap: 16px; margin-top: 10px; background: rgba(255,255,255,.15); padding: 8px 12px; border-radius: 8px; }
    .streak-item { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-box { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 8px; text-align: center; }
    .stat-box .sv { font-size: 22px; font-weight: 700; color: #2e7d32; }
    .stat-box .sl { font-size: 11px; color: #888; margin-top: 3px; }

    /* ── Daily tasks ── */
    .task-row  { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .task-row:last-child { border-bottom: none; }
    .task-check { width: 22px; height: 22px; border: 2px solid #2e7d32; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #fff; }
    .task-check.done { background: #2e7d32; }
    .task-text { flex: 1; font-size: 13px; color: #444; }
    .task-text.done { text-decoration: line-through; color: #aaa; }
    .task-pts { font-size: 11px; font-weight: 700; color: #f57c00; }

    /* ── Module cards ── */
    .module-card { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 12px; cursor: pointer; }
    .module-card:hover { border-color: #2e7d32; background: #f9fff9; }
    .mc-header { padding: 14px; display: flex; align-items: center; gap: 12px; }
    .mc-icon   { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .mc-cat    { font-size: 11px; color: #888; margin-bottom: 3px; }
    .mc-title  { font-size: 14px; font-weight: 700; color: #222; }
    .mc-body   { padding: 0 14px 14px; }
    .mc-desc   { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.5; }
    .mc-meta   { display: flex; gap: 12px; font-size: 12px; color: #888; margin-bottom: 6px; flex-wrap: wrap; }
    .mc-meta-pts { color: #f57c00; font-weight: 700; display: flex; align-items: center; gap: 3px; }

    /* ── Module banner ── */
    .mod-banner { background: linear-gradient(135deg, #2e7d32, #43a047); color: #fff; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    .mod-banner h2 { font-size: 18px; font-weight: 700; margin: 8px 0 6px; }
    .mod-banner .meta { display: flex; gap: 12px; font-size: 12px; opacity: .85; flex-wrap: wrap; }

    /* ── Lessons ── */
    .lesson-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
    .lesson-item:hover { border-color: #2e7d32; background: #f1f8e9; }
    .l-num { width: 32px; height: 32px; border-radius: 8px; background: #e8f5e9; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #2e7d32; flex-shrink: 0; }
    .l-num.done { background: #2e7d32; color: #fff; }
    .l-pts { margin-left: auto; font-size: 11px; font-weight: 700; color: #f57c00; background: #fff8e1; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; gap: 3px; }
    .lesson-page { padding: 16px; padding-bottom: 80px; }
    .lesson-hdr  { background: #f1f8e9; border: 1px solid #c8e6c9; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .lesson-hdr h2 { font-size: 16px; font-weight: 700; color: #1b5e20; margin-bottom: 8px; }
    .content-block { border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .content-block h3 { font-size: 14px; font-weight: 700; color: #2e7d32; margin: 12px 0 6px; }
    .content-block h3:first-child { margin-top: 0; }
    .content-block p  { font-size: 13px; color: #444; line-height: 1.7; margin-bottom: 10px; }
    .content-block ul { padding-left: 16px; }
    .content-block li { font-size: 13px; color: #444; line-height: 1.7; margin-bottom: 4px; }
    .tip-block { background: #fffde7; border-left: 3px solid #f9a825; padding: 10px 12px; border-radius: 0 8px 8px 0; font-size: 13px; color: #555; margin: 10px 0; line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
    .expert-box { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #1565c0; font-weight: 600; }

    /* ── Quiz ── */
    .quiz-box { background: #f3e5f5; border: 1px solid #ce93d8; border-radius: 10px; padding: 14px; }
    .quiz-q   { font-size: 14px; font-weight: 600; color: #4a148c; margin-bottom: 10px; display: flex; gap: 7px; align-items: flex-start; }
    .quiz-opts { display: flex; flex-direction: column; gap: 6px; }
    .quiz-opt { padding: 10px 12px; border-radius: 8px; border: 1px solid #ba68c8; background: #fff; font-size: 13px; color: #333; cursor: pointer; text-align: left; }
    .quiz-opt.correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; font-weight: 600; }
    .quiz-opt.wrong   { background: #ffebee; border-color: #ef9a9a; color: #c62828; }
    .quiz-result { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
    .quiz-result.ok { background: #e8f5e9; color: #2e7d32; }
    .quiz-result.no { background: #ffebee; color: #c62828; }
    .lesson-footer { display: flex; gap: 10px; margin-top: 12px; }

    /* ── Tracker ── */
    .prac-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .prac-chip { border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 12px; color: #555; background: #fff; cursor: pointer; text-align: center; }
    .prac-chip.sel { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; font-weight: 600; }
    .prac-chip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .prac-chip-name { display: flex; flex-direction: column; align-items: center; gap: 5px; padding-top: 4px; }
    .info-btn { background: none; border: none; cursor: pointer; color: #2e7d32; padding: 0; }

    .log-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .log-item:last-child { border-bottom: none; }
    .log-dot  { width: 8px; height: 8px; background: #2e7d32; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .log-lbl  { font-size: 13px; font-weight: 600; color: #333; }
    .log-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .log-pts  { margin-left: auto; font-size: 12px; font-weight: 700; color: #f57c00; flex-shrink: 0; }

    /* ── Guide modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; }
    .modal-box { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; margin: 0 auto; max-height: 85vh; overflow-y: auto; padding: 20px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .modal-title  { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-close  { background: #f5f5f5; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .guide-why  { background: #e8f5e9; border-left: 3px solid #2e7d32; padding: 10px 12px; border-radius: 0 8px 8px 0; font-size: 13px; color: #2e7d32; margin-bottom: 14px; line-height: 1.6; }
    .guide-step { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .step-num   { min-width: 24px; height: 24px; background: #2e7d32; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .step-text  { font-size: 13px; color: #444; line-height: 1.6; }
    .guide-tip  { background: #fffde7; border-left: 3px solid #f9a825; padding: 10px 12px; border-radius: 0 8px 8px 0; font-size: 13px; color: #555; margin-top: 14px; line-height: 1.6; }

    /* ── Community ── */
    .inner-tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 14px; }
    .inner-tab { flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 600; color: #888; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .inner-tab.active { color: #2e7d32; border-bottom-color: #2e7d32; }
    .new-post-box { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-bottom: 16px; }
    .new-post-box textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; resize: vertical; outline: none; font-family: inherit; background: #fff; }
    .new-post-box textarea:focus { border-color: #2e7d32; }
    .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .tag-row  { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid #ccc; background: #fff; cursor: pointer; color: #555; }
    .tag-chip.sel { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; font-weight: 600; }
    .forum-post { border: 1px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .fp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .fp-av   { width: 36px; height: 36px; background: #c8e6c9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #2e7d32; flex-shrink: 0; }
    .fp-name { font-size: 13px; font-weight: 700; }
    .fp-time { font-size: 11px; color: #aaa; }
    .fp-body { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 10px; }
    .fp-tag  { background: #f1f8e9; color: #2e7d32; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .fp-footer { display: flex; align-items: center; gap: 12px; }
    .fp-action { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; cursor: pointer; border: none; background: none; padding: 0; }
    .fp-action.liked { color: #2e7d32; }
    .fp-reply  { background: #f9f9f9; border-left: 3px solid #2e7d32; padding: 10px 12px; border-radius: 0 8px 8px 0; margin-top: 8px; font-size: 12px; color: #444; line-height: 1.6; }
    .rep-name  { font-weight: 700; color: #1565c0; margin-bottom: 3px; font-size: 12px; }

    /* ── Leaderboard ── */
    .lb-card { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 8px; }
    .lb-card.me { background: #e8f5e9; border-color: #2e7d32; }
    .lb-rank { font-size: 15px; font-weight: 700; color: #888; width: 24px; text-align: center; flex-shrink: 0; }
    .lb-rank.r1 { color: #f9a825; } .lb-rank.r2 { color: #9e9e9e; } .lb-rank.r3 { color: #a1887f; }
    .lb-av  { width: 36px; height: 36px; background: #c8e6c9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #2e7d32; }
    .lb-pts { margin-left: auto; font-weight: 700; color: #2e7d32; font-size: 14px; display: flex; align-items: center; gap: 3px; }

    /* ── Profile ── */
    .prof-top { background: linear-gradient(135deg, #2e7d32, #43a047); color: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
    .prof-av  { width: 60px; height: 60px; background: rgba(255,255,255,.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; flex-shrink: 0; }
    .prof-name { font-size: 18px; font-weight: 700; }
    .prof-sub  { font-size: 12px; opacity: .8; margin-top: 3px; }
    .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .bdg { background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; padding: 12px 8px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bdg.locked { opacity: .35; }
    .bdg-name { font-size: 11px; font-weight: 600; color: #555; }
    .bdg-desc { font-size: 10px; color: #999; }

    /* ── Settings ── */
    .settings-section-title { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 6px; cursor: pointer; }
    .settings-item:hover { background: #f1f8e9; }
    .settings-item-left { display: flex; align-items: center; gap: 10px; }
    .settings-item-label { font-size: 14px; font-weight: 600; }
    .settings-item-sub   { font-size: 12px; color: #888; margin-top: 1px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 6px; }
    .toggle { width: 40px; height: 22px; border-radius: 11px; background: #ccc; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: #2e7d32; }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle.on .toggle-knob { left: 20px; }

    /* ── Admin ── */

/* ── API helper ─────────────────────────────────────────── */
async function apiFetch(endpoint, options = {}) {
  const token = localStorage.getItem('agrigrow_token');
  const res = await fetch(`${API}${endpoint}`, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ── Shared components ───────────────────────────────────── */
function Icon({ name, size = 20, color }) {
  return <span className="mi" style={{ fontSize: size, color: color || 'currentColor' }}>{name}</span>;
}
function ProgBar({ pct }) {
  return <div className="prog-wrap"><div className="prog-fill" style={{ width: `${Math.min(pct, 100)}%` }} /></div>;
}
function DiffBadge({ diff }) {
  const cls = diff === 'Easy' ? 'badge-easy' : (diff === 'Medium' || diff === 'Intermediate') ? 'badge-medium' : 'badge-hard';
  return <span className={`badge ${cls}`}>{diff}</span>;
}
function Toggle({ on, onClick }) {
  return <div className={`toggle ${on ? 'on' : ''}`} onClick={onClick}><div className="toggle-knob" /></div>;
}
function Loading() {
  return <div className="loading-wrap"><div className="spinner" /><span>Loading...</span></div>;
}

/* ── Validation helpers ──────────────────────────────────── */
function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}
function pwChecks(pw) {
  return {
    length:    pw.length >= 8,
    upper:     /[A-Z]/.test(pw),
    lower:     /[a-z]/.test(pw),
    number:    /[0-9]/.test(pw),
    symbol:    /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(pw),
  };
}
function pwStrength(checks) {
  const score = Object.values(checks).filter(Boolean).length;
  if (score <= 2) return { pct: 20, color: '#e53935', label: 'Weak' };
  if (score === 3) return { pct: 50, color: '#fb8c00', label: 'Fair' };
  if (score === 4) return { pct: 80, color: '#fdd835', label: 'Good' };
  return { pct: 100, color: '#43a047', label: 'Strong' };
}

/* ── Auth page ───────────────────────────────────────────── */
function AuthPage({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ name: '', email: '', password: '', region: '', farmSize: '', cropType: '', experience: '' });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [touched, setTouched] = useState({ name: false, email: false, password: false });
  // nameStatus: 'idle' | 'checking' | 'available' | 'taken'
  const [nameStatus, setNameStatus] = useState('idle');

  const setField = (key, val) => setForm(f => ({ ...f, [key]: val }));
  const touch    = (key)      => setTouched(t => ({ ...t, [key]: true }));

  /* — Debounced username availability check — */
  useEffect(() => {
    const trimmed = form.name.trim();
    if (!trimmed) { setNameStatus('idle'); return; }
    setNameStatus('checking');
    const timer = setTimeout(async () => {
      try {
        const res  = await fetch(`${API}/auth/check-username?name=${encodeURIComponent(trimmed)}`);
        const data = await res.json();
        setNameStatus(data.available ? 'available' : 'taken');
      } catch {
        setNameStatus('idle');
      }
    }, 500);            // 500 ms debounce
    return () => clearTimeout(timer);
  }, [form.name]);

  /* live validation */
  const emailOk = validateEmail(form.email);
  const checks  = pwChecks(form.password);
  const pwOk    = Object.values(checks).every(Boolean);
  const strength = pwStrength(checks);

  const nameErr  = touched.name     && nameStatus === 'taken'  ? 'This username is already taken. Please choose another.' : '';
  const emailErr = touched.email    && !emailOk  ? 'Please enter a valid email address.' : '';
  const pwErr    = touched.password && !pwOk     ? 'Password must include uppercase, lowercase, numbers, and symbols.' : '';
  // Block submit while taken OR still in-flight
  const registerReady = form.name.trim() && nameStatus === 'available' && emailOk && pwOk && form.region;

  const login = async () => {
    setErr(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: { email: form.email, password: form.password } });
      localStorage.setItem('agrigrow_token', data.token);
      onLogin(data.user);
    } catch (e) {
      setErr(e.message);
    } finally { setLoading(false); }
  };

  const register = async () => {
    /* force-show all inline errors */
    setTouched({ name: true, email: true, password: true });
    if (nameStatus === 'taken')       { setErr('This username is already taken. Please choose another.'); return; }
    if (nameStatus === 'checking')    { setErr('Please wait — checking username availability…'); return; }
    if (!registerReady) {
      if (!emailOk) { setErr('Please enter a valid email address.'); return; }
      if (!pwOk)    { setErr('Password must include uppercase, lowercase, numbers, and symbols.'); return; }
      setErr('Please fill all required fields.');
      return;
    }
    setErr(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/register', { method: 'POST', body: form });
      localStorage.setItem('agrigrow_token', data.token);
      onLogin(data.user);
    } catch (e) {
      setErr(e.message);
    } finally { setLoading(false); }
  };

  const PwHints = () => (
    <div className="pw-hints">
      {[['length','8+ chars'],['upper','A–Z'],['lower','a–z'],['number','0–9'],['symbol','!@#…']].map(([k,label]) => (

          {checks[k] ? '✓' : '○'} {label}
        </span>
      ))}
    </div>
  );

  return (
    <div className="auth-wrap">
      <div className="auth-logo">
        <div className="auth-logo-icon"><Icon name="eco" size={38} color="#2e7d32" /></div>
        <h1>AgriGrow</h1>
        <p>Gamified Sustainable Farming Platform</p>
      </div>
      <div className="tab-row">
        <button className={`tab-btn ${tab === 'login' ? 'active' : ''}`}
          onClick={() => { setTab('login'); setErr(''); setTouched({ name: false, email: false, password: false }); setNameStatus('idle'); }}>
          Login
        </button>
        <button className={`tab-btn ${tab === 'register' ? 'active' : ''}`}
          onClick={() => { setTab('register'); setErr(''); setTouched({ name: false, email: false, password: false }); setNameStatus('idle'); }}>
          Register
        </button>
      </div>
      {err && <div className="alert alert-error"><Icon name="error" size={16} />{err}</div>}
      {tab === 'login' ? (
        <>
          <div className="fg">
            <label>Email</label>
            <input id="login-email" type="email" placeholder="farmer@demo.com" value={form.email} onChange={e => setField('email', e.target.value)} />
          </div>
          <div className="fg">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" value={form.password} onChange={e => setField('password', e.target.value)} />
          </div>
          <button id="login-btn" className="btn btn-green" onClick={login} disabled={loading}>{loading ? 'Logging in...' : <><Icon name="login" size={18} />Login</>}</button>
          <p className="hint">Demo: farmer@demo.com / farm123 &nbsp;|&nbsp; Admin: admin@agrigrow.app / admin123</p>
        </>
      ) : (
        <>
          {/* Full Name / Username with availability check */}
          <div className="fg">
            <label>Full Name / Username *</label>
            <div style={{ position: 'relative' }}>
              <input
                id="reg-name"
                placeholder="Your name"
                value={form.name}
                className={
                  form.name.trim()
                    ? nameStatus === 'available' ? 'input-ok'
                    : nameStatus === 'taken'     ? 'input-error'
                    : ''
                  : ''
                }
                onChange={e => { setField('name', e.target.value); }}
                onBlur={() => touch('name')}
              />
              {/* Inline status icon — right side of input */}
              {nameStatus === 'checking' && (
                <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)' }}>
                  <div className="spinner" style={{ width:16, height:16, borderWidth:2 }} />
                </span>
              )}
              {nameStatus === 'available' && form.name.trim() && (
                <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', color:'#43a047', fontSize:18, lineHeight:1 }}>✓</span>
              )}
              {nameStatus === 'taken' && (
                <span style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', color:'#e53935', fontSize:18, lineHeight:1 }}>✕</span>
              )}
            </div>
            {nameErr && <div className="field-err"><Icon name="error" size={11} />{nameErr}</div>}
            {nameStatus === 'available' && form.name.trim() && (
              <div style={{ fontSize:11, color:'#43a047', marginTop:4, display:'flex', alignItems:'center', gap:4 }}>
                <Icon name="check_circle" size={11} color="#43a047" /> Username available
              </div>
            )}
          </div>

          {/* Email with live validation */}
          <div className="fg">

              onChange={e => setField('email', e.target.value)}
              onBlur={() => touch('email')}
            />
            {emailErr && <div className="field-err"><Icon name="error" size={11} />{emailErr}</div>}
          </div>

          {/* Password with strength meter */}
          <div className="fg">
            <label>Password *</label>
            <input
              id="reg-password"
              type="password"
              placeholder="Min 8 characters"
              value={form.password}
              className={touched.password ? (pwOk ? 'input-ok' : 'input-error') : ''}
              onChange={e => setField('password', e.target.value)}
              onBlur={() => touch('password')}
            />
            {form.password && (
              <div className="pw-strength">
                <div className="pw-strength-bar">
                  <div className="pw-strength-fill" style={{ width: strength.pct + '%', background: strength.color }} />
                </div>
                <PwHints />
              </div>
            )}
            {pwErr && <div className="field-err"><Icon name="error" size={11} />{pwErr}</div>}
          </div>

          <div className="fg"><label>State / Region *</label><select id="reg-region" value={form.region} onChange={e => setField('region', e.target.value)}><option value="">Select...</option>{REGIONS.map(r => <option key={r}>{r}</option>)}</select></div>
          <div className="fg"><label>Main Crop Type</label><select value={form.cropType} onChange={e => setField('cropType', e.target.value)}><option value="">Select...</option>{CROP_TYPES.map(c => <option key={c}>{c}</option>)}</select></div>
          <div className="fg"><label>Farming Experience</label><select value={form.experience} onChange={e => setField('experience', e.target.value)}><option value="">Select...</option>{EXP_OPTS.map(x => <option key={x}>{x}</option>)}</select></div>
          <div className="fg"><label>Farm Size (acres)</label><input type="number" placeholder="e.g. 5" value={form.farmSize} onChange={e => setField('farmSize', e.target.value)} /></div>
          <button
            id="register-btn"
            className="btn btn-green"
            onClick={register}
            disabled={loading}
            style={{ opacity: registerReady ? 1 : 0.6 }}
          >
            {loading ? 'Creating...' : <><Icon name="person_add" size={18} />Create Account</>}
          </button>
        </>
      )}
    </div>
  );
}

function LessonView({ lesson, mod, appState, onCompleteLesson, onBack, onNext }) {
  const [ans, setAns] = useState(null);
  const c = lesson.content;
  const done = appState.completedLessons.includes(lesson.id);
  const idx = mod.lessons.findIndex(l => l.id === lesson.id);

  useEffect(() => { setAns(null); }, [lesson.id]);

  const pick = async (i) => {
    if (ans !== null) return;
    setAns(i);
    if (c.quiz && i === c.quiz.ans && !done) await onCompleteLesson(lesson.id, lesson.pts);
  };

  return (
    <div className="lesson-page">
      <button className="back-btn" onClick={onBack}><Icon name="arrow_back" size={14} />{mod.title}</button>
      {lesson.expertVerified && <div className="expert-box"><Icon name="verified_user" size={16} />This lesson has been verified by an agricultural expert.</div>}
      <div className="lesson-hdr">
        <h2>{c.heading}</h2>
        <div style={{ display: 'flex', gap: 12, fontSize: 12, color: '#555', flexWrap: 'wrap' }}>
          <span>Lesson {idx + 1}/{mod.lessons.length}</span>
          <span style={{ color: '#f57c00', fontWeight: 700 }}><Icon name="star" size={12} color="#f57c00" /> {lesson.pts} pts</span>
          {done && <span style={{ color: '#2e7d32', fontWeight: 700 }}><Icon name="check_circle" size={12} color="#2e7d32" /> Done</span>}
        </div>
      </div>
      <div className="content-block">
        {c.sections.map((s, i) => {
          if (s.type === 'p')   return <p key={i}>{s.text}</p>;
          if (s.type === 'h3')  return <h3 key={i}>{s.text}</h3>;
          if (s.type === 'tip') return <div key={i} className="tip-block"><Icon name="lightbulb" size={16} color="#f9a825" /><span>{s.text}</span></div>;
          if (s.type === 'ul')  return <ul key={i}>{s.items.map((it, j) => <li key={j}>{it}</li>)}</ul>;
          return null;
        })}
      </div>
      {c.quiz ? (
        <div className="quiz-box">
          <div className="quiz-q"><Icon name="quiz" size={16} color="#4a148c" />{c.quiz.q}</div>
          <div className="quiz-opts">
            {c.quiz.opts.map((opt, i) => (
              <button key={i} className={`quiz-opt ${ans === i ? (i === c.quiz.ans ? 'correct' : 'wrong') : ''}`} onClick={() => pick(i)}>{opt}</button>
            ))}
          </div>
          {ans !== null && (
            <div className={`quiz-result ${ans === c.quiz.ans ? 'ok' : 'no'}`}>
              {ans === c.quiz.ans
                ? <><Icon name="check_circle" size={14} />Correct! +{lesson.pts} points!</>
                : <><Icon name="cancel" size={14} />Wrong. Answer: {c.quiz.opts[c.quiz.ans]}</>}
            </div>
          )}
        </div>
      ) : (
        <div className="quiz-box" style={{ background: '#f1f8e9', borderColor: '#c8e6c9' }}>
          <div className="quiz-q" style={{ color: '#2e7d32' }}><Icon name="check_circle" size={16} color="#2e7d32" />Mark this lesson as complete to earn {lesson.pts} pts</div>
          {done
            ? <div className="quiz-result ok"><Icon name="check_circle" size={14} />Already completed! +{lesson.pts} points earned.</div>
            : <button className="btn btn-green" style={{ marginTop: 8 }} onClick={async () => { if (!done) await onCompleteLesson(lesson.id, lesson.pts); }}><Icon name="check" size={16} />Mark Complete (+{lesson.pts} pts)</button>
          }
        </div>
      )}
      <div className="lesson-footer">
        <button className="btn btn-outline" onClick={onBack}><Icon name="arrow_back" size={14} />Back</button>
        {idx < mod.lessons.length - 1 && <button className="btn btn-solid" onClick={() => onNext(mod.lessons[idx + 1])}>Next<Icon name="arrow_forward" size={14} /></button>}
      </div>
    </div>
  );
}

/* ── Tracker page ────────────────────────────────────────── */
function TrackerPage({ appState, onLogPractice, toast }) {
  const [sel, setSel] = useState([]);
  const [notes, setNotes] = useState('');
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
  const [guide, setGuide] = useState(null);
  const [logs, setLogs] = useState([]);
  const [logsLoading, setLogsLoading] = useState(true);

  useEffect(() => {
    apiFetch('/tracker').then(d => setLogs(d.logs)).catch(() => {}).finally(() => setLogsLoading(false));
  }, []);

  const toggle = (id) => setSel(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

  const logPractice = async () => {
    if (!sel.length) return;
    try {
      const data = await apiFetch('/tracker', { method: 'POST', body: { practices: sel, notes, date } });
      onLogPractice(data);
      const newLog = { practices: sel, notes, date, pts: data.pts };
      setLogs(l => [newLog, ...l]);
      toast(`Logged! +${data.pts} pts`);
      setSel([]); setNotes('');
    } catch (e) {
      toast('Failed to log: ' + e.message);
    }
  };

  return (
    <div className="page">
      {guide && <GuideModal practice={guide} onClose={() => setGuide(null)} />}
      <div className="sec-title"><Icon name="assignment" size={15} color="#2e7d32" />Log Today's Practices</div>
      <div className="fg"><label>Date</label><input type="date" value={date} onChange={e => setDate(e.target.value)} /></div>
      <div style={{ fontSize: 13, fontWeight: 600, color: '#444', marginBottom: 8 }}>Select practices <span style={{ fontSize: 11, color: '#888', fontWeight: 400 }}>(tap ℹ️ for guide)</span></div>
      <div className="prac-grid">
        {PRACTICES.map(p => (
          <div key={p.id} className={`prac-chip ${sel.includes(p.id) ? 'sel' : ''}`}>
            <div className="prac-chip-row"><div /><button className="info-btn" onClick={e => { e.stopPropagation(); setGuide(p); }}><Icon name="info" size={14} /></button></div>
            <div className="prac-chip-name" onClick={() => toggle(p.id)}>
              <Icon name={p.icon} size={24} color={sel.includes(p.id) ? '#1b5e20' : '#2e7d32'} />
              {p.label}<DiffBadge diff={p.difficulty} />
            </div>
          </div>
        ))}
      </div>

      <div className="fg"><label>Notes (optional)</label><textarea rows={3} placeholder="Any observations or results..." value={notes} onChange={e => setNotes(e.target.value)} /></div>
      <button className="btn btn-green" onClick={logPractice} disabled={!sel.length} style={{ opacity: sel.length ? 1 : .5 }}>
        <Icon name="check" size={16} />Submit Practice Log (+{sel.length * 20} pts)
      </button>
      <div className="sec-title" style={{ marginTop: 20 }}><Icon name="bar_chart" size={15} color="#2e7d32" />Activity History</div>
      {logsLoading ? <Loading /> : !logs.length
        ? <p style={{ fontSize: 13, color: '#888', textAlign: 'center', padding: '20px 0' }}>No activities logged yet.</p>
        : logs.map((entry, i) => (
          <div key={i} className="log-item">
            <div className="log-dot" />
            <div style={{ flex: 1 }}>
              <div className="log-lbl">{entry.practices.map(id => PRACTICES.find(p => p.id === id)?.label).join(', ')}</div>
              <div className="log-meta">{entry.date}{entry.notes && ` · ${entry.notes}`}</div>
            </div>
            <div className="log-pts">+{entry.pts}</div>
          </div>
        ))
      }
    </div>
  );
}

/* ── Community page ──────────────────────────────────────── */
function CommunityPage({ user, appState, onCommunityPost, toast }) {
  const [tab, setTab] = useState('forum');
  const [posts, setPosts] = useState([]);
  const [leaderboard, setLeaderboard] = useState([]);
  const [newPost, setNewPost] = useState('');
  const [selTag, setSelTag] = useState('Soil');
  const [loading, setLoading] = useState(true);
  const [deletingId, setDeletingId] = useState(null);

  useEffect(() => {
    if (tab === 'forum') {
      setLoading(true);
      apiFetch('/posts').then(d => setPosts(d.posts)).catch(() => {}).finally(() => setLoading(false));
    } else {
      setLoading(true);
      apiFetch('/leaderboard').then(d => setLeaderboard(d.leaderboard)).catch(() => {}).finally(() => setLoading(false));
    }
  }, [tab]);

  const likePost = async (id) => {
    try {
      const data = await apiFetch(`/posts/${id}/like`, { method: 'POST' });
      setPosts(ps => ps.map(p => p.id === id ? { ...p, liked: data.liked, likes: data.likes } : p));
    } catch (e) { toast('Failed to like post'); }
  };

  const deletePost = async (id) => {
    if (!window.confirm('Delete this post? This cannot be undone.')) return;
    setDeletingId(id);
    try {
      await apiFetch(`/posts/${id}`, { method: 'DELETE' });
      setPosts(ps => ps.filter(p => p.id !== id));
      toast('Post deleted.');
    } catch (e) {
      toast('Failed to delete: ' + e.message);
    } finally {
      setDeletingId(null);
    }
  };

  const submit = async () => {
    if (!newPost.trim()) return;
    try {
      const data = await apiFetch('/posts', { method: 'POST', body: { body: newPost.trim(), tag: selTag } });
      setPosts(ps => [data.post, ...ps]);
      onCommunityPost(data);
      toast('Posted! +10 points');
      setNewPost('');
    } catch (e) { toast('Failed to post: ' + e.message); }
  };

  const rankClass = (i) => i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';

  return (
    <div className="page">
      <div className="inner-tabs">
        <button className={`inner-tab ${tab === 'forum' ? 'active' : ''}`} onClick={() => setTab('forum')}><Icon name="forum" size={14} />Forum</button>
        <button className={`inner-tab ${tab === 'leaderboard' ? 'active' : ''}`} onClick={() => setTab('leaderboard')}><Icon name="emoji_events" size={14} />Leaderboard</button>
      </div>

      {tab === 'forum' && (
        <>
          <div className="new-post-box">
            <div style={{ fontSize: 13, fontWeight: 600, color: '#444', marginBottom: 8 }}>Ask a question or share an experience</div>
            <textarea rows={3} placeholder="What's on your mind?" value={newPost} onChange={e => setNewPost(e.target.value)} />
            <div className="post-footer">
              <div className="tag-row">{['Soil','Water','Pests','Rotation','General'].map(t => <span key={t} className={`tag-chip ${selTag === t ? 'sel' : ''}`} onClick={() => setSelTag(t)}>{t}</span>)}</div>
              <button className="btn btn-solid" style={{ padding: '8px 14px', fontSize: 13 }} onClick={submit}><Icon name="send" size={13} />Post</button>
            </div>
          </div>
          {loading ? <Loading /> : posts.map(p => (
            <div key={p.id} className="forum-post">
              <div className="fp-header">
                <div className="fp-av">{p.author[0]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span className="fp-name">{p.author}</span>
                    {p.isExpert && <span className="badge-expert"><Icon name="verified_user" size={9} />Expert</span>}
                  </div>
                  <div className="fp-time">{p.time}</div>
                </div>
                <span className="fp-tag">{p.tag}</span>
                {p.userId === user.id && (
                  <button
                    className="fp-action"
                    style={{ color: deletingId === p.id ? '#aaa' : '#e53935', marginLeft: 6 }}
                    onClick={() => deletePost(p.id)}
                    disabled={deletingId === p.id}
                    title="Delete post"
                  >
                    <Icon name="delete" size={15} />
                  </button>
                )}
              </div>
              <div className="fp-body">{p.body}</div>
              {p.reply && <div className="fp-reply"><div className="rep-name"><Icon name="verified_user" size={11} color="#1565c0" />{p.reply.author}</div>{p.reply.text}</div>}
              <div className="fp-footer">
                 <button className={`fp-action ${p.liked ? 'liked' : ''}`} onClick={() => likePost(p.id)}><Icon name="thumb_up" size={14} />{p.likes}</button>
              </div>
            </div>
          ))}
        </>
      )}

      {tab === 'leaderboard' && (
        <>
          <div className="sec-title"><Icon name="emoji_events" size={15} color="#2e7d32" />Regional Rankings</div>
          {loading ? <Loading /> : leaderboard.map((f, i) => (
            <div key={f.id} className={`lb-card ${f.id === user.id ? 'me' : ''}`}>
              <div className={`lb-rank ${rankClass(i)}`}>{i + 1}</div>
              <div className="lb-av"><Icon name="person" size={18} /></div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{f.id === user.id ? `${f.name} (You)` : f.name}</div>
                <div style={{ fontSize: 11, color: '#888' }}>{f.region}</div>
              </div>
              <div className="lb-pts"><Icon name="star" size={13} />{f.points}</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}
